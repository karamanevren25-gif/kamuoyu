<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Çevrimdışı · Reyy</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #07111F; color: #D8DEE9; font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; }
    .box { text-align: center; padding: 40px 24px; }
    .emoji { font-size: 44px; margin-bottom: 14px; }
    h1 { color: #F5F8FF; font-size: 20px; margin: 0 0 8px; }
    p { color: #9CA3AF; font-size: 14px; line-height: 1.6; margin: 0 0 22px; }
    button { padding: 12px 30px; background: linear-gradient(135deg, #1E3A5F, #2563EB); color: #F0EDE8; border: none; border-radius: 11px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .bar { display: inline-flex; width: 60px; height: 5px; border-radius: 4px; overflow: hidden; margin-top: 26px; }
    .bar i { flex: 1; }
    .red { background: #E05A5A; } .green { background: #4CAF7D; }
  </style>
</head>
<body>
  <div class="box">
    <div class="emoji">📡</div>
    <h1>Bağlantı yok</h1>
    <p>İnternet bağlantını kontrol edip<br />tekrar dener misin?</p>
    <button onclick="location.reload()">Tekrar Dene</button>
    <div class="bar"><i class="red"></i><i class="green"></i></div>
  </div>
</body>
</html>
